version: 2
models:
  - name: stg_customers
    description: 氏名の前後空白除去などクレンジングを行い、dbt_privacy パッケージで氏名をマスキングした Staging 層モデル
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

        data_type: integer
      - name: first_name
        data_type: text
      - name: last_name
        data_type: text
  - name: stg_orders
    description: ステータス表記のゆれ（大文字小文字・空白）を吸収した Staging 層モデル
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
        data_type: integer
      - name: customer_id
        data_type: integer
      - name: order_date
        data_type: date
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: [completed, shipped, returned, placed]

        data_type: text
  - name: stg_payments
    description: 金額が0以下の異常データを除外した Staging 層モデル
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
        data_type: integer
      - name: order_id
        data_type: integer
      - name: payment_method
        data_type: text
      - name: amount
        data_type: numeric
