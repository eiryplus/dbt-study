version: 2

models:
  - name: dwh_dim_customers
    description: "顧客ディメンション（DWH 層）"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dwh_fct_orders
    description: "注文ファクト（DWH 層）"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dwh_dim_customers')
                field: customer_id
