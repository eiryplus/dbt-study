version: 2
seeds:
  - name: raw_customers
    columns:
      - name: id
        data_type: integer
      - name: first_name
        data_type: text
      - name: last_name
        data_type: text
  - name: raw_orders
    columns:
      - name: id
        data_type: integer
      - name: user_id
        data_type: integer
      - name: order_date
        data_type: date
      - name: status
        data_type: text
  - name: raw_payments
    columns:
      - name: id
        data_type: integer
      - name: order_id
        data_type: integer
      - name: payment_method
        data_type: text
      - name: amount
        data_type: integer
