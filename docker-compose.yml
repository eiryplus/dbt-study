services:
  postgres:
    image: postgres:16-alpine
    container_name: dbt_learning_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbt}
      POSTGRES_DB: ${POSTGRES_DB:-dbt_learning}
    ports:
      # ホスト内ツール(psql 等)用。LAN には公開しない
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbt}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
      # airflow-study との連携用共有ネットワーク(docker network create data-platform)
      data-platform:
        aliases:
          - dbt-postgres

  dbt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbt_learning_dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-dbt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbt}
      POSTGRES_DB: ${POSTGRES_DB:-dbt_learning}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-analytics}
      DBT_PROFILES_DIR: /usr/app/dbt_project
    ports:
      - "8080:8080"
    volumes:
      - ./dbt_project:/usr/app/dbt_project
      - dbt_packages:/usr/app/dbt_project/dbt_packages
    working_dir: /usr/app
    tty: true
    stdin_open: true

volumes:
  pgdata:
  dbt_packages:

networks:
  data-platform:
    external: true
