services:
  postgres:
    image: postgres:16-alpine
    container_name: dbt_learning_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbt}
      POSTGRES_DB: ${POSTGRES_DB:-dbt_learning}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dbt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbt_learning_dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-dbt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbt}
      POSTGRES_DB: ${POSTGRES_DB:-dbt_learning}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-analytics}
      DBT_PROFILES_DIR: /usr/app/dbt_project
    ports:
      - "8080:8080"
    volumes:
      - ./dbt_project:/usr/app/dbt_project
    working_dir: /usr/app
    tty: true
    stdin_open: true

volumes:
  pgdata:
